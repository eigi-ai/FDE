<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>003 - State Driven UI</title>
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1f2937;
        background: #f5f7fb;
      }

      body {
        margin: 0;
      }

      main {
        width: min(1000px, calc(100% - 32px));
        margin: 0 auto;
        padding: 44px 0;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 32px;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 0 0 24px;
        color: #5f6b7a;
        line-height: 1.6;
      }

      .panel {
        padding: 20px;
        border: 1px solid #dbe3ef;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 14px 32px rgba(31, 41, 55, 0.06);
      }

      .buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 18px;
      }

      button {
        min-height: 42px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #ffffff;
        color: #1f2937;
        font: inherit;
        font-weight: 700;
        padding: 0 14px;
        cursor: pointer;
      }

      button:hover,
      button:focus {
        border-color: #2563eb;
        outline: 3px solid rgba(37, 99, 235, 0.14);
      }

      .screen {
        display: grid;
        min-height: 260px;
        place-items: center;
        border: 1px dashed #aebdd0;
        border-radius: 8px;
        background: #f8fafc;
        text-align: center;
      }

      .card {
        width: min(520px, calc(100% - 32px));
        padding: 20px;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 10px 24px rgba(31, 41, 55, 0.08);
      }

      .state-name {
        display: inline-block;
        margin-bottom: 10px;
        padding: 5px 9px;
        border-radius: 999px;
        background: #e0f2fe;
        color: #0369a1;
        font-size: 13px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .spinner {
        width: 42px;
        height: 42px;
        margin: 8px auto 16px;
        border: 4px solid #dbeafe;
        border-top-color: #2563eb;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      pre {
        margin: 18px 0 0;
        overflow: auto;
        padding: 16px;
        border-radius: 8px;
        background: #111827;
        color: #e5e7eb;
        font-size: 14px;
        line-height: 1.5;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>State Driven UI</h1>
      <p class="subtitle">
        Use this to teach that the screen is a function of current state: idle, loading, success, error, or empty.
      </p>

      <section class="panel">
        <div class="buttons" aria-label="State controls">
          <button type="button" data-state="idle">Idle</button>
          <button type="button" data-state="loading">Loading</button>
          <button type="button" data-state="success">Success</button>
          <button type="button" data-state="error">Error</button>
          <button type="button" data-state="empty">Empty</button>
        </div>

        <div id="screen" class="screen"></div>

        <pre id="stateCode"></pre>
      </section>
    </main>

    <script>
      const screen = document.querySelector("#screen");
      const stateCode = document.querySelector("#stateCode");

      const states = {
        idle: {
          loading: false,
          error: "",
          result: null,
          html: `
            <div class="card">
              <span class="state-name">Idle</span>
              <h2>Ready for user action</h2>
              <p>The user has not searched yet. Show a clear input and button.</p>
            </div>
          `,
        },
        loading: {
          loading: true,
          error: "",
          result: null,
          html: `
            <div class="card">
              <span class="state-name">Loading</span>
              <div class="spinner" aria-hidden="true"></div>
              <h2>Fetching data...</h2>
              <p>The user should know the app is working.</p>
            </div>
          `,
        },
        success: {
          loading: false,
          error: "",
          result: { city: "Nagpur", temp: 34, humidity: 42 },
          html: `
            <div class="card">
              <span class="state-name">Success</span>
              <h2>Nagpur Weather</h2>
              <p>Temperature: 34 C</p>
              <p>Humidity: 42%</p>
            </div>
          `,
        },
        error: {
          loading: false,
          error: "Could not fetch data.",
          result: null,
          html: `
            <div class="card">
              <span class="state-name">Error</span>
              <h2>Something went wrong</h2>
              <p>Show a useful error message and let the user retry.</p>
            </div>
          `,
        },
        empty: {
          loading: false,
          error: "",
          result: [],
          html: `
            <div class="card">
              <span class="state-name">Empty</span>
              <h2>No results found</h2>
              <p>The request worked, but there is no data to display.</p>
            </div>
          `,
        },
      };

      function render(stateName) {
        const state = states[stateName];
        screen.innerHTML = state.html;
        stateCode.textContent = JSON.stringify(
          {
            loading: state.loading,
            error: state.error,
            result: state.result,
          },
          null,
          2
        );
      }

      document.querySelectorAll("[data-state]").forEach((button) => {
        button.addEventListener("click", () => render(button.dataset.state));
      });

      render("idle");
    </script>
  </body>
</html>
